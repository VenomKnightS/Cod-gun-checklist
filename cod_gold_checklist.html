<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>COD Mobile – Gold &amp; Diamond</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0c10;
    --panel: #111520;
    --border: #1e2535;
    --gold: #d4a017;
    --gold2: #f5c842;
    --diamond: #7ee8fa;
    --diamond2: #a8f0ff;
    --progress: #ff8c00;
    --progress2: #ffb347;
    --red: #ff3a3a;
    --text: #c8d0e0;
    --dim: #5a6480;
    --header-h: 52px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: sticky; top: 0; z-index: 100;
    background: #0d0f18;
    border-bottom: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; height: var(--header-h); gap: 10px;
  }
  #topbar h1 {
    font-size: 1.1rem; font-weight: 700; letter-spacing: 2px;
    color: var(--gold2); text-transform: uppercase; white-space: nowrap; flex: 1;
  }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    background: var(--panel); border: 1px solid var(--border); color: var(--gold);
    border-radius: 6px; padding: 6px 10px; font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; text-decoration: none;
  }
  .icon-btn:active { background: #1a2030; }

  /* ── PROGRESS ── */
  #progress-wrap {
    background: #0d0f18; padding: 8px 14px 10px;
    border-bottom: 1px solid var(--border);
  }
  .prog-row { margin-bottom: 6px; }
  .prog-row:last-child { margin-bottom: 0; }
  .prog-label {
    font-size: 0.72rem; letter-spacing: 1px; margin-bottom: 3px;
    font-family: 'Share Tech Mono', monospace;
    display: flex; justify-content: space-between;
  }
  .prog-bar-bg { background: #1a1f2e; border-radius: 4px; height: 7px; overflow: hidden; }
  .prog-bar { height: 100%; border-radius: 4px; transition: width 0.3s ease; width: 0%; }
  #prog-bar   { background: linear-gradient(90deg, var(--progress), var(--progress2)); }
  #gold-bar   { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
  #diam-bar   { background: linear-gradient(90deg, #4fc3f7, var(--diamond2)); }
  .gold-label { color: var(--gold); }
  .diam-label { color: var(--diamond); }
  .prog-label-color { color: var(--progress); }

  /* ── LEGEND ── */
  #legend {
    display: flex; gap: 12px; padding: 5px 14px;
    background: #0d0f18; border-bottom: 1px solid var(--border);
    font-size: 0.68rem; font-family: 'Share Tech Mono', monospace; align-items: center;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-box { width: 13px; height: 13px; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
  .legend-box.p { background: var(--progress); }
  .legend-box.g { background: var(--gold); }
  .legend-box.d { background: var(--diamond); }
  .legend-diam { width: 8px; height: 8px; background: #000; clip-path: polygon(50% 0%, 100% 40%, 50% 100%, 0% 40%); }
  .legend-half { width: 8px; height: 8px; background: #000; clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%); border-radius: 1px; }

  /* ── CATEGORY ── */
  .category { margin: 10px 10px 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }

  .cat-header {
    display: flex; align-items: center; background: #141824;
    padding: 0 8px; min-height: 50px; gap: 6px;
    cursor: pointer; user-select: none;
    border-bottom: 1px solid transparent; transition: background 0.15s;
  }
  .cat-header:active { background: #1a2030; }
  .cat-header.open { border-bottom-color: var(--border); }

  /* Gold bulk checkbox on header */
  .cat-cb-group {
    display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0;
  }
  .cat-cb-label {
    font-size: 0.52rem; letter-spacing: 0.5px; font-weight: 700;
    text-transform: uppercase; line-height: 1; color: var(--gold);
  }
  .cat-check {
    width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--gold);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s; z-index: 2;
  }
  .cat-check.checked { background: var(--gold); }
  .cat-check svg { display: none; }
  .cat-check.checked svg { display: block; }

  .cat-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }

  .cat-name {
    flex: 1; font-size: 0.9rem; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--gold2);
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cat-counts {
    display: flex; flex-direction: column; align-items: flex-end;
    font-family: 'Share Tech Mono', monospace; font-size: 0.63rem; white-space: nowrap;
    flex-shrink: 0; gap: 1px;
  }
  .cat-counts .pc { color: var(--progress); }
  .cat-counts .gc { color: var(--gold); }
  .cat-counts .dc { color: var(--diamond); }

  .cat-clear-btn {
    background: transparent; border: 1px solid var(--red); color: var(--red);
    border-radius: 5px; font-family: 'Rajdhani', sans-serif; font-weight: 700;
    font-size: 0.66rem; letter-spacing: 0.5px; padding: 3px 6px;
    cursor: pointer; white-space: nowrap; z-index: 2; transition: background 0.15s; flex-shrink: 0;
  }
  .cat-clear-btn:active { background: rgba(255,58,58,0.15); }

  .chevron { color: var(--dim); font-size: 0.9rem; transition: transform 0.2s; flex-shrink: 0; }
  .cat-header.open .chevron { transform: rotate(180deg); }

  /* ── WEAPON LIST ── */
  .cat-body { display: none; background: var(--panel); }
  .cat-body.open { display: block; }

  .weapon-row {
    display: flex; align-items: center;
    padding: 9px 12px; border-bottom: 1px solid var(--border);
    gap: 7px; transition: background 0.1s;
  }
  .weapon-row:last-child { border-bottom: none; }
  .weapon-row:active { background: #161c2a; }

  /* checkboxes */
  .weapon-check {
    width: 22px; height: 22px; border-radius: 4px; border: 2px solid var(--dim);
    background: transparent; flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .weapon-check.prog-cb.checked  { background: var(--progress); border-color: var(--progress); }
  .weapon-check.gold-cb.checked  { background: var(--gold);     border-color: var(--gold); }
  .weapon-check.diam-cb.checked  { background: var(--diamond);  border-color: var(--diamond); }
  .weapon-check svg { display: none; }
  .weapon-check.gold-cb.checked svg { display: block; }
  .weapon-check.prog-cb.checked svg { display: block; }

  /* diamond shape */
  .diam-icon { width: 11px; height: 11px; background: #000; clip-path: polygon(50% 0%, 100% 40%, 50% 100%, 0% 40%); display: none; }
  .weapon-check.diam-cb.checked .diam-icon { display: block; }

  .check-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

  .weapon-name {
    flex: 1; font-size: 0.93rem; font-weight: 500; letter-spacing: 0.5px;
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* in progress: orange tint */
  .weapon-row.prog-done:not(.gold-done):not(.diam-done) .weapon-name {
    color: var(--progress2);
  }
  /* gold done: strikethrough */
  .weapon-row.gold-done:not(.diam-done) .weapon-name {
    color: var(--gold); text-decoration: line-through; opacity: 0.75;
  }
  /* diamond: cyan glow */
  .weapon-row.diam-done .weapon-name {
    color: var(--diamond2);
    text-shadow: 0 0 8px rgba(126,232,250,0.45);
    text-decoration: none; opacity: 1;
  }

  .remove-btn {
    background: transparent; border: none; color: var(--dim);
    font-size: 1rem; cursor: pointer; padding: 4px 5px;
    border-radius: 4px; transition: color 0.15s, background 0.15s; line-height: 1; flex-shrink: 0;
  }
  .remove-btn:active { color: var(--red); background: rgba(255,58,58,0.1); }

  /* ── ADD ROW ── */
  .add-row {
    display: flex; padding: 8px 10px; gap: 8px;
    background: #0e1220; border-top: 1px dashed var(--border);
  }
  .add-input {
    flex: 1; background: #1a1f2e; border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 7px 10px;
    font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; outline: none;
  }
  .add-input:focus { border-color: var(--gold); }
  .add-btn {
    background: var(--gold); border: none; color: #000; border-radius: 6px;
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.9rem;
    padding: 0 14px; cursor: pointer; letter-spacing: 1px;
  }
  .add-btn:active { background: var(--gold2); }

  /* ── MODAL ── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 200;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: #141824; border: 1px solid var(--gold);
    border-radius: 10px; padding: 22px 18px 16px;
    max-width: 320px; width: 100%; text-align: center;
  }
  .modal h3 { font-size: 1rem; letter-spacing: 1px; color: var(--gold2); margin-bottom: 10px; text-transform: uppercase; }
  .modal p  { font-size: 0.88rem; color: var(--text); margin-bottom: 18px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1; padding: 10px 0; border-radius: 6px;
    font-family: 'Rajdhani', sans-serif; font-weight: 700;
    font-size: 0.95rem; letter-spacing: 1px; cursor: pointer; border: none; text-transform: uppercase;
  }
  .modal-btn.confirm { background: var(--red); color: #fff; }
  .modal-btn.cancel  { background: var(--panel); color: var(--text); border: 1px solid var(--border); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--gold); color: #000; font-weight: 700;
    font-size: 0.82rem; letter-spacing: 1px;
    padding: 10px 18px; border-radius: 8px; z-index: 300;
    transition: transform 0.3s ease; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="topbar">
  <h1>⚔️ COD Mobile</h1>
  <div class="topbar-actions">
    <button class="icon-btn" id="bookmarkBtn" title="Bookmark">🔖</button>
    <a class="icon-btn" id="downloadBtn" title="Save">💾</a>
  </div>
</div>

<div id="progress-wrap">
  <div class="prog-row">
    <div class="prog-label">
      <span class="prog-label-color">🔶 IN PROGRESS</span>
      <span class="prog-label-color" id="prog-nums">0 / 0 — 0%</span>
    </div>
    <div class="prog-bar-bg"><div class="prog-bar" id="prog-bar"></div></div>
  </div>
  <div class="prog-row">
    <div class="prog-label">
      <span class="gold-label">🥇 GOLD</span>
      <span class="gold-label" id="gold-nums">0 / 0 — 0%</span>
    </div>
    <div class="prog-bar-bg"><div class="prog-bar" id="gold-bar"></div></div>
  </div>
  <div class="prog-row">
    <div class="prog-label">
      <span class="diam-label">💎 DIAMOND</span>
      <span class="diam-label" id="diam-nums">0 / 0 — 0%</span>
    </div>
    <div class="prog-bar-bg"><div class="prog-bar" id="diam-bar"></div></div>
  </div>
</div>

<div id="legend">
  <div class="legend-item">
    <div class="legend-box p"><svg width="9" height="7" viewBox="0 0 13 10" fill="none"><polyline points="1,5 5,9 12,1" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span class="prog-label-color">In Progress</span>
  </div>
  <div class="legend-item">
    <div class="legend-box g"><svg width="9" height="7" viewBox="0 0 13 10" fill="none"><polyline points="1,5 5,9 12,1" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <span class="gold-label">Gold</span>
  </div>
  <div class="legend-item">
    <div class="legend-box d"><div class="legend-diam"></div></div>
    <span class="diam-label">Diamond</span>
  </div>
</div>

<div id="categories"></div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h3 id="modal-title">Confirm</h3>
    <p id="modal-msg"></p>
    <div class="modal-btns">
      <button class="modal-btn cancel"  id="modal-cancel">Cancel</button>
      <button class="modal-btn confirm" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const CATEGORIES_DEFAULT = [
  { id:'ar',       name:'Assault Rifles',   weapons:['Type 25','M16','AK117','AK-47','ASM10','M4','BK57','LK24','ICR-1','Man-O-War','KN-44','HBRa3','HVK-30','DR-H','Peacekeeper MK2','AS VAL','FR .556','CR-56 AMAX','M13','Swordfish','Kilo 141','Oden','Krig 6','EM2','Maddox','Grau 5.56','FFAR 1','Type 19','BP50','LAG 53'] },
  { id:'smg',      name:'SMGs',             weapons:['RUS-79U','Chicom','PDW-57','Razorback','MSMC','Pharo','GKS','Cordite','QQ9','Fennec','AGR 556','QXR','Bizon','MX9','CBR4','PPSH-41','MAC-10','KSP 45','Switchblade X9','LAPA','CX-9','OTs 9','Striker 45','TEC-9'] },
  { id:'sniper',   name:'Sniper Rifles',    weapons:['DL Q33','Arctic .50','M21 EBR','XPR-50','Locus','Outlaw','NA-45','Rytec AMR','SVD','Koshka','ZRG 20mm','HDR','LW3-Tundra'] },
  { id:'lmg',      name:'LMGs',             weapons:['S36','UL736','RPD','M4LMG','Chopper','Holger 26','Hades','PKM','Dingo','Bruen MK9','MG42'] },
  { id:'shotgun',  name:'Shotguns',         weapons:['BY15','HS2126','Striker','HS0405','KRM-262','Echo','R9-0','JAK-12'] },
  { id:'marksman', name:'Marksman Rifles',  weapons:['Kilo Bolt-Action','SKS','SP-R 208','MK2'] },
  { id:'pistol',   name:'Pistols',          weapons:['MW11','J358','.50 GS','Renetti','Shorty','Crossbow','L-CAR 9','Dobvra'] },
  { id:'melee',    name:'Melee',            weapons:['Knife','Axe','Baseball Bat','Sickle','Machete','Wrench','Katana','Prizefighters','Nunchucks','Kali Sticks','Butterfly Knife'] },
  { id:'launcher', name:'Launchers',        weapons:['SMRS','FHJ-18','Thumper','D13 Sector'] },
];

const STORE_KEY = 'cod_gd_v2';
function loadState() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; } }
function saveState(s) { try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch {} }

let state = loadState();
CATEGORIES_DEFAULT.forEach(cat => {
  if (!state[cat.id]) state[cat.id] = { open:false, progress:{}, gold:{}, diamond:{}, extra:[] };
  if (!state[cat.id].progress) state[cat.id].progress = {};
  if (!state[cat.id].gold)     state[cat.id].gold = {};
  if (!state[cat.id].diamond)  state[cat.id].diamond = {};
  if (!state[cat.id].extra)    state[cat.id].extra = [];
  // migrate old formats
  if (state[cat.id].weapons) { state[cat.id].gold = state[cat.id].weapons; delete state[cat.id].weapons; }
});
saveState(state);

// modal
let pendingAction = null;
function showModal(title, msg, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  pendingAction = onConfirm;
  document.getElementById('modal').classList.add('show');
}
document.getElementById('modal-cancel').addEventListener('click', () => { document.getElementById('modal').classList.remove('show'); pendingAction = null; });
document.getElementById('modal-confirm').addEventListener('click', () => { document.getElementById('modal').classList.remove('show'); if (pendingAction) { pendingAction(); pendingAction = null; } });

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

function updateProgress() {
  let total = 0, pDone = 0, gDone = 0, dDone = 0;
  CATEGORIES_DEFAULT.forEach(cat => {
    const cs = state[cat.id];
    const all = [...cat.weapons, ...(cs.extra||[])];
    total += all.length;
    all.forEach(w => {
      if (cs.progress[w]) pDone++;
      if (cs.gold[w])     gDone++;
      if (cs.diamond[w])  dDone++;
    });
  });
  const pp = total ? Math.round(pDone/total*100) : 0;
  const gp = total ? Math.round(gDone/total*100) : 0;
  const dp = total ? Math.round(dDone/total*100) : 0;
  document.getElementById('prog-nums').textContent = `${pDone} / ${total} — ${pp}%`;
  document.getElementById('gold-nums').textContent = `${gDone} / ${total} — ${gp}%`;
  document.getElementById('diam-nums').textContent = `${dDone} / ${total} — ${dp}%`;
  document.getElementById('prog-bar').style.width = pp + '%';
  document.getElementById('gold-bar').style.width = gp + '%';
  document.getElementById('diam-bar').style.width = dp + '%';
}

const CHECK_SVG = `<svg width="13" height="10" viewBox="0 0 13 10" fill="none"><polyline points="1,5 5,9 12,1" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function buildAll() {
  const c = document.getElementById('categories');
  c.innerHTML = '';
  CATEGORIES_DEFAULT.forEach(cat => renderCategory(cat, c));
  updateProgress();
}

function renderCategory(cat, container) {
  const cs = state[cat.id];
  const all = [...cat.weapons, ...(cs.extra||[])];
  const pDone = all.filter(w => cs.progress[w]).length;
  const gDone = all.filter(w => cs.gold[w]).length;
  const dDone = all.filter(w => cs.diamond[w]).length;
  const allG  = all.length > 0 && gDone === all.length;

  const div = document.createElement('div');
  div.className = 'category'; div.id = 'cat-' + cat.id;

  const header = document.createElement('div');
  header.className = 'cat-header' + (cs.open ? ' open' : '');

  // Gold bulk checkbox only
  const gGroup = document.createElement('div'); gGroup.className = 'cat-cb-group';
  const gLbl = document.createElement('div'); gLbl.className = 'cat-cb-label'; gLbl.textContent = 'GOLD';
  const gCB = document.createElement('div');
  gCB.className = 'cat-check' + (allG ? ' checked' : '');
  gCB.innerHTML = CHECK_SVG;
  gCB.addEventListener('click', e => {
    e.stopPropagation();
    if (allG) return;
    all.forEach(w => { cs.gold[w] = true; cs.progress[w] = false; }); // clear in-progress when bulk gold
    saveState(state); refreshCategory(cat); updateProgress();
  });
  gGroup.appendChild(gLbl); gGroup.appendChild(gCB);

  const sep = document.createElement('div'); sep.className = 'cat-divider';
  const catName = document.createElement('div'); catName.className = 'cat-name'; catName.textContent = cat.name;

  const counts = document.createElement('div'); counts.className = 'cat-counts';
  counts.innerHTML = `<span class="pc">🔶${pDone}/${all.length}</span><span class="gc">🥇${gDone}/${all.length}</span><span class="dc">💎${dDone}/${all.length}</span>`;

  const clearBtn = document.createElement('button'); clearBtn.className = 'cat-clear-btn'; clearBtn.textContent = 'CLEAR';
  clearBtn.addEventListener('click', e => {
    e.stopPropagation();
    showModal('Clear Category', `Clear ALL marks in "${cat.name}"?`, () => {
      all.forEach(w => { cs.progress[w] = false; cs.gold[w] = false; cs.diamond[w] = false; });
      saveState(state); refreshCategory(cat); updateProgress();
    });
  });

  const chevron = document.createElement('span'); chevron.className = 'chevron'; chevron.textContent = '▼';

  header.appendChild(gGroup); header.appendChild(sep);
  header.appendChild(catName); header.appendChild(counts); header.appendChild(clearBtn); header.appendChild(chevron);

  header.addEventListener('click', () => {
    cs.open = !cs.open; saveState(state);
    header.classList.toggle('open', cs.open); body.classList.toggle('open', cs.open);
  });

  const body = document.createElement('div');
  body.className = 'cat-body' + (cs.open ? ' open' : '');
  all.forEach(w => body.appendChild(buildWeaponRow(cat, w)));

  // add row
  const addRow = document.createElement('div'); addRow.className = 'add-row';
  const addInput = document.createElement('input'); addInput.className = 'add-input'; addInput.placeholder = 'Add weapon…'; addInput.maxLength = 40;
  const addBtn = document.createElement('button'); addBtn.className = 'add-btn'; addBtn.textContent = '+ ADD';
  addBtn.addEventListener('click', () => {
    const name = addInput.value.trim(); if (!name) return;
    if (!cs.extra.includes(name) && !cat.weapons.includes(name)) {
      cs.extra.push(name); saveState(state); addInput.value = ''; refreshCategory(cat); updateProgress();
    } else { addInput.value = ''; }
  });
  addInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
  addRow.appendChild(addInput); addRow.appendChild(addBtn); body.appendChild(addRow);

  div.appendChild(header); div.appendChild(body); container.appendChild(div);
}

function buildWeaponRow(cat, wName) {
  const cs = state[cat.id];
  const isP = !!cs.progress[wName];
  const isG = !!cs.gold[wName];
  const isD = !!cs.diamond[wName];

  const row = document.createElement('div');
  row.className = 'weapon-row' + (isP ? ' prog-done' : '') + (isG ? ' gold-done' : '') + (isD ? ' diam-done' : '');

  // In Progress CB
  const pCB = document.createElement('div');
  pCB.className = 'weapon-check prog-cb' + (isP ? ' checked' : '');
  pCB.title = 'In Progress';
  pCB.innerHTML = CHECK_SVG;
  pCB.addEventListener('click', () => {
    cs.progress[wName] = !cs.progress[wName];
    saveState(state); refreshCategory(cat); updateProgress();
  });

  const sep1 = document.createElement('div'); sep1.className = 'check-sep';

  // Gold CB — clears in-progress when checked
  const gCB = document.createElement('div');
  gCB.className = 'weapon-check gold-cb' + (isG ? ' checked' : '');
  gCB.title = 'Gold';
  gCB.innerHTML = CHECK_SVG;
  gCB.addEventListener('click', () => {
    const newVal = !cs.gold[wName];
    cs.gold[wName] = newVal;
    if (newVal) cs.progress[wName] = false; // auto-clear in progress
    saveState(state); refreshCategory(cat); updateProgress();
  });

  const sep2 = document.createElement('div'); sep2.className = 'check-sep';

  // Diamond CB
  const dCB = document.createElement('div');
  dCB.className = 'weapon-check diam-cb' + (isD ? ' checked' : '');
  dCB.title = 'Diamond';
  dCB.innerHTML = `<div class="diam-icon"></div>`;
  dCB.addEventListener('click', () => {
    cs.diamond[wName] = !cs.diamond[wName];
    saveState(state); refreshCategory(cat); updateProgress();
  });

  const name = document.createElement('div'); name.className = 'weapon-name'; name.textContent = wName;

  const rmBtn = document.createElement('button'); rmBtn.className = 'remove-btn'; rmBtn.textContent = '✕'; rmBtn.title = 'Remove';
  rmBtn.addEventListener('click', () => {
    showModal('Remove Weapon', `Remove "${wName}" from ${cat.name}?`, () => {
      cs.extra = cs.extra.filter(x => x !== wName);
      delete cs.progress[wName]; delete cs.gold[wName]; delete cs.diamond[wName];
      saveState(state); refreshCategory(cat); updateProgress();
    });
  });

  row.appendChild(pCB); row.appendChild(sep1); row.appendChild(gCB); row.appendChild(sep2); row.appendChild(dCB); row.appendChild(name); row.appendChild(rmBtn);
  return row;
}

function refreshCategory(cat) {
  const old = document.getElementById('cat-' + cat.id);
  if (old) { const tmp = document.createElement('div'); renderCategory(cat, tmp); old.replaceWith(tmp.firstChild); }
}

// download
document.getElementById('downloadBtn').addEventListener('click', e => {
  e.preventDefault();
  const blob = new Blob([document.documentElement.outerHTML], { type:'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'cod_gold_checklist.html';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
});

// bookmark
document.getElementById('bookmarkBtn').addEventListener('click', () => {
  const isFile = window.location.protocol === 'file:';
  if (navigator.share) {
    navigator.share({ title:'COD Mobile Gold & Diamond', url:window.location.href }).catch(()=>{});
  } else {
    showToast(isFile ? '📌 Browser menu → Add to Home Screen' : '📌 Tap ⋮ → Add to Home Screen');
  }
});

buildAll();
</script>
</body>
